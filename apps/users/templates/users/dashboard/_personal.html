{% load i18n %}
{% load humanize %}

<div x-data="{
    emailMkt: {% if form.email_marketing.value %}true{% else %}false{% endif %},
    pushNotif: {% if form.push_notifications.value != False %}true{% else %}false{% endif %},
    submitting: false
}">

    <form method="post" enctype="multipart/form-data" 
          x-on:submit="submitting = true"
          hx-post="{% url 'profile' %}"
          hx-target="#personal-form-container"
          hx-swap="innerHTML"
          @htmx:after-request="submitting = false"
          @htmx:after-on-load="if(event.detail.successful) { Alpine.store('toast').show('Profile updated successfully!', 'success'); } else { Alpine.store('toast').show('Failed to update profile', 'error'); }">
        {% csrf_token %}

        {# Personal Information #}
        <div class="bg-white border border-surface-200 rounded-xl p-5 mb-4">
            <h3 class="font-semibold text-charcoal-800 mb-4 flex items-center gap-2">
                <i class="bi bi-person text-corporate-600"></i>
                {% trans "Personal Information" %}
            </h3>
            
            <div id="personal-form-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-charcoal-600 mb-1">{% trans "First Name" %}</label>
                    <input type="text" name="first_name" 
                           class="w-full px-3 py-2 border border-surface-200 rounded-lg focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 text-sm"
                           value="{{ form.first_name.value|default:user.first_name }}">
                </div>

                <div>
                    <label class="block text-sm text-charcoal-600 mb-1">{% trans "Last Name" %}</label>
                    <input type="text" name="last_name" 
                           class="w-full px-3 py-2 border border-surface-200 rounded-lg focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 text-sm"
                           value="{{ form.last_name.value|default:user.last_name }}">
                </div>

                <div>
                    <label class="block text-sm text-charcoal-600 mb-1">{% trans "Phone" %}</label>
                    <input type="text" name="phone" 
                           class="w-full px-3 py-2 border border-surface-200 rounded-lg focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 text-sm"
                           value="{{ form.phone.value|default:'' }}">
                </div>

                <div>
                    <label class="block text-sm text-charcoal-600 mb-1">{% trans "Date of Birth" %}</label>
                    <input type="date" name="date_of_birth" 
                           class="w-full px-3 py-2 border border-surface-200 rounded-lg focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 text-sm"
                           value="{{ form.date_of_birth.value|default:'' }}">
                </div>

                <div>
                    <label class="block text-sm text-charcoal-600 mb-1">{% trans "Gender" %}</label>
                    <select name="gender" class="w-full px-3 py-2 border border-surface-200 rounded-lg focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 text-sm">
                        <option value="" {% if not form.gender.value %}selected{% endif %}>{% trans "Select" %}</option>
                        <option value="male" {% if form.gender.value == "male" %}selected{% endif %}>{% trans "Male" %}</option>
                        <option value="female" {% if form.gender.value == "female" %}selected{% endif %}>{% trans "Female" %}</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-charcoal-600 mb-1">{% trans "Email" %}</label>
                    <input type="email" class="w-full px-3 py-2 border border-surface-200 rounded-lg bg-surface-50 text-charcoal-500 text-sm" value="{{ user.email }}" disabled>
                    <p class="text-xs text-charcoal-400 mt-1">{% trans "Contact support to change" %}</p>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm text-charcoal-600 mb-1">{% trans "Address" %}</label>
                    <textarea name="address" rows="2" 
                              class="w-full px-3 py-2 border border-surface-200 rounded-lg focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 text-sm resize-none">{{ form.address.value|default:'' }}</textarea>
                </div>
            </div>
        </div>

        {# Notifications #}
        <div class="bg-white border border-surface-200 rounded-xl p-5 mb-4">
            <h3 class="font-semibold text-charcoal-800 mb-4 flex items-center gap-2">
                <i class="bi bi-bell text-corporate-600"></i>
                {% trans "Notifications" %}
            </h3>
            
            <div class="flex flex-col gap-3">
                <label class="flex items-center justify-between p-3 border border-surface-200 rounded-lg cursor-pointer hover:bg-surface-50">
                    <div class="flex items-center gap-3">
                        <i class="bi bi-envelope text-charcoal-400"></i>
                        <span class="text-sm text-charcoal-700">{% trans "Email Promotions" %}</span>
                    </div>
                    <input type="hidden" name="email_marketing" value="">
                    <input type="checkbox" name="email_marketing" x-model="emailMkt" class="w-4 h-4 text-corporate-600 rounded border-surface-300 focus:ring-corporate-600">
                </label>
                
                <label class="flex items-center justify-between p-3 border border-surface-200 rounded-lg cursor-pointer hover:bg-surface-50">
                    <div class="flex items-center gap-3">
                        <i class="bi bi-phone text-charcoal-400"></i>
                        <span class="text-sm text-charcoal-700">{% trans "Push Notifications" %}</span>
                    </div>
                    <input type="hidden" name="push_notifications" value="">
                    <input type="checkbox" name="push_notifications" x-model="pushNotif" class="w-4 h-4 text-corporate-600 rounded border-surface-300 focus:ring-corporate-600">
                </label>
            </div>
        </div>

        <div class="flex justify-end">
            <button type="submit" 
                    class="px-5 py-2.5 bg-corporate-600 text-white font-medium rounded-lg hover:bg-corporate-700 transition-colors"
                    :disabled="submitting"
                    :class="submitting ? 'opacity-50' : ''">
                <span x-text="submitting ? 'Saving...' : '{% trans "Save Changes" %}'"></span>
            </button>
        </div>
    </form>
</div>
