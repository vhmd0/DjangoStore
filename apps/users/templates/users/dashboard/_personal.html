{% load i18n %}
{% load humanize %}

<div x-data="{
    emailMkt: {% if form.email_marketing.value %}true{% else %}false{% endif %},
    pushNotif: {% if form.push_notifications.value != False %}true{% else %}false{% endif %},
    submitting: false
}">

    <form method="post" enctype="multipart/form-data" 
          x-on:submit="submitting = true"
          hx-post="{% url 'profile' %}"
          hx-target="#personal-form-container"
          hx-swap="innerHTML"
          @htmx:after-request="submitting = false"
          @htmx:after-on-load="if(event.detail.successful) { Alpine.store('toast').show('Profile updated!', 'success'); } else { Alpine.store('toast').show('Failed to update', 'error'); }">
        {% csrf_token %}

        {# Personal Info Card #}
        <div class="max-w-2xl">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-corporate-100 rounded-lg">
                    <i class="bi bi-person text-corporate-600"></i>
                </div>
                <h3 class="font-semibold text-gray-900">{% trans "Personal Information" %}</h3>
            </div>
            
            <div id="personal-form-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "First Name" %}</label>
                    <input type="text" name="first_name" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-corporate-500 focus:border-corporate-500 text-sm"
                           value="{{ form.first_name.value|default:user.first_name }}">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Last Name" %}</label>
                    <input type="text" name="last_name" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-corporate-500 focus:border-corporate-500 text-sm"
                           value="{{ form.last_name.value|default:user.last_name }}">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Phone" %}</label>
                    <input type="text" name="phone" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-corporate-500 focus:border-corporate-500 text-sm"
                           value="{{ form.phone.value|default:'' }}">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Date of Birth" %}</label>
                    <input type="date" name="date_of_birth" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-corporate-500 focus:border-corporate-500 text-sm"
                           value="{{ form.date_of_birth.value|default:'' }}">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Gender" %}</label>
                    <select name="gender" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-corporate-500 focus:border-corporate-500 text-sm">
                        <option value="" {% if not form.gender.value %}selected{% endif %}>{% trans "Select" %}</option>
                        <option value="male" {% if form.gender.value == "male" %}selected{% endif %}>{% trans "Male" %}</option>
                        <option value="female" {% if form.gender.value == "female" %}selected{% endif %}>{% trans "Female" %}</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Email" %}</label>
                    <input type="email" class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500 text-sm" value="{{ user.email }}" disabled>
                </div>

                {# Remove address field - use Addresses tab instead #}
            </div>
        </div>

        <hr class="my-6 border-gray-200">

        {# Notifications Card #}
        <div class="max-w-2xl">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-blue-100 rounded-lg">
                    <i class="bi bi-bell text-blue-600"></i>
                </div>
                <h3 class="font-semibold text-gray-900">{% trans "Notifications" %}</h3>
            </div>
            
            <div class="space-y-3">
                <label class="flex items-center justify-between p-3 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer">
                    <div class="flex items-center gap-3">
                        <i class="bi bi-envelope text-gray-400"></i>
                        <span class="text-sm text-gray-700">{% trans "Email Promotions" %}</span>
                    </div>
                    <input type="hidden" name="email_marketing" value="">
                    <input type="checkbox" name="email_marketing" x-model="emailMkt" class="w-4 h-4 text-corporate-600 rounded border-gray-300 focus:ring-corporate-500">
                </label>
                
                <label class="flex items-center justify-between p-3 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer">
                    <div class="flex items-center gap-3">
                        <i class="bi bi-phone text-gray-400"></i>
                        <span class="text-sm text-gray-700">{% trans "Push Notifications" %}</span>
                    </div>
                    <input type="hidden" name="push_notifications" value="">
                    <input type="checkbox" name="push_notifications" x-model="pushNotif" class="w-4 h-4 text-corporate-600 rounded border-gray-300 focus:ring-corporate-500">
                </label>
            </div>
        </div>

        <div class="mt-6 flex justify-end">
            <button type="submit" 
                    class="px-5 py-2.5 bg-corporate-600 text-white font-medium rounded-lg hover:bg-corporate-700 focus:ring-4 focus:ring-corporate-300 transition-colors"
                    :disabled="submitting"
                    :class="submitting ? 'opacity-70 cursor-not-allowed' : ''">
                <span x-text="submitting ? 'Saving...' : '{% trans "Save Changes" %}'"></span>
            </button>
        </div>
    </form>
</div>
