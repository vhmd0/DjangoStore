{% load i18n %}

<div class="bottom-nav-app d-lg-none position-fixed bottom-0 start-0 w-100 bg-white border-top" style="height: 60px;">
  <div class="d-flex flex-row h-100 align-items-center justify-content-around text-center w-100">

    <a href="{% url 'home' %}" class="nav-tab-app text-decoration-none d-flex flex-column align-items-center justify-content-center py-1 w-100 h-100 gap-1 {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
      <i class="bi bi-house-door" style="font-size: 1.2rem;"></i>
      <span class="text-uppercase" style="font-size: 0.55rem; letter-spacing: 0.04em;">{% trans "Home" %}</span>
    </a>

    <a href="{% url 'products:products' %}" class="nav-tab-app text-decoration-none d-flex flex-column align-items-center justify-content-center py-1 w-100 h-100 gap-1 {% if 'products' in request.path %}active{% endif %}">
      <i class="bi bi-grid-3x3-gap" style="font-size: 1.2rem;"></i>
      <span class="text-uppercase" style="font-size: 0.55rem; letter-spacing: 0.04em;">{% trans "Shop" %}</span>
    </a>

    <a href="{% url 'categories:categories' %}" class="nav-tab-app text-decoration-none d-flex flex-column align-items-center justify-content-center py-1 w-100 h-100 gap-1 {% if 'category' in request.path %}active{% endif %}">
      <i class="bi bi-tags" style="font-size: 1.2rem;"></i>
      <span class="text-uppercase" style="font-size: 0.55rem; letter-spacing: 0.04em;">{% trans "Categories" %}</span>
    </a>

    <a href="{% url 'wishlist' %}" class="nav-tab-app position-relative text-decoration-none d-flex flex-column align-items-center justify-content-center py-1 w-100 h-100 gap-1 {% if request.resolver_match.url_name == 'wishlist' %}active{% endif %}">
      <i class="bi bi-heart" style="font-size: 1.2rem;"></i>
      {% if wishlist_count > 0 %}<span class="badge-count-app position-absolute translate-middle rounded-circle d-flex align-items-center justify-content-center" style="width: 16px; height: 16px; top: 6px; right: calc(50% - 20px);">{{ wishlist_count }}</span>{% endif %}
      <span class="text-uppercase" style="font-size: 0.55rem; letter-spacing: 0.04em;">{% trans "Wishlist" %}</span>
    </a>

    <a href="#cartOffcanvas" data-bs-toggle="offcanvas" class="nav-tab-app position-relative text-decoration-none d-flex flex-column align-items-center justify-content-center py-1 w-100 h-100 gap-1">
      <i class="bi bi-bag" style="font-size: 1.2rem;"></i>
      {% if cart_count > 0 %}<span class="badge-count-app position-absolute translate-middle rounded-circle d-flex align-items-center justify-content-center" style="width: 16px; height: 16px; top: 6px; right: calc(50% - 20px);">{{ cart_count }}</span>{% endif %}
      <span class="text-uppercase" style="font-size: 0.55rem; letter-spacing: 0.04em;">{% trans "Cart" %}</span>
    </a>

    <button onclick="toggleTheme()" class="nav-tab-app text-decoration-none d-flex flex-column align-items-center justify-content-center py-1 w-100 h-100 gap-1 border-0 bg-transparent">
      <span style="position: relative; width: 1.2rem; height: 1.2rem;">
        <i class="bi bi-moon" style="font-size: 1.2rem; position: absolute;"></i>
        <i class="bi bi-sun" style="font-size: 1.2rem; position: absolute; display: none;"></i>
      </span>
      <span class="text-uppercase" style="font-size: 0.55rem; letter-spacing: 0.04em;">{% trans "Theme" %}</span>
    </button>

  </div>
</div>
