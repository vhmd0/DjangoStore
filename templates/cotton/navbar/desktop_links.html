{% load i18n %}

<ul class="d-none d-lg-flex flex-row list-unstyled mb-0 gap-1 mx-auto">
  <li>
    <a class="nav-link-cyber text-decoration-none px-2 py-1 rounded d-flex align-items-center gap-1 text-nowrap {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">
      <span class="nav-num">00</span> {% trans "Home" %}
    </a>
  </li>
  <li>
    <a class="nav-link-cyber text-decoration-none px-2 py-1 rounded d-flex align-items-center gap-1 text-nowrap {% if 'products' in request.path %}active{% endif %}" href="{% url 'products:products' %}">
      <span class="nav-num">01</span> {% trans "Shop" %}
    </a>
  </li>
  <li class="dropdown">
    <a class="nav-link-cyber dropdown-toggle text-decoration-none px-2 py-1 rounded d-flex align-items-center gap-1 text-nowrap {% if 'category' in request.path %}active{% endif %}" href="#" data-bs-toggle="dropdown">
      <span class="nav-num">02</span> {% trans "Categories" %}
    </a>
    <ul class="dropdown-menu border-0 shadow-lg dark-dropdown mt-2" style="min-width: 140px;">
      <li><a class="dropdown-item py-2 fw-semibold text-white rounded mb-1 text-center w-100 bg-transparent border-0" href="{% url 'categories:categories' %}">{% trans "All Categories" %}</a></li>
      <li><hr class="dropdown-divider opacity-25 my-2"></li>
      {% for cat in menu_categories %}
        <li><a class="dropdown-item py-2 fw-semibold text-white rounded text-center w-100 bg-transparent border-0" href="{{ cat.get_absolute_url }}">{{ cat.get_name }}</a></li>
      {% endfor %}
    </ul>
  </li>
</ul>
