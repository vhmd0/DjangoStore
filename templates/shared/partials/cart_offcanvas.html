{% load i18n %}
{# Cart Offcanvas #}
<div
  id="cartOffcanvas"
  x-data="{ open: false }"
  @cart-open.window="open = true"
  @keydown.escape.window="open = false"
  x-cloak
>
  {# Backdrop #}
  <div
    x-show="open"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-[59] bg-black/40"
    @click="open = false"
  ></div>
  {# Panel #}
  <div
    class="fixed inset-y-0 end-0 z-[60] w-full max-w-sm bg-white shadow-xl border-s border-surface-200"
    tabindex="-1"
    role="dialog"
    aria-modal="true"
    aria-labelledby="cartOffcanvasLabel"
    x-show="open"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="ltr:translate-x-full rtl:-translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="ltr:translate-x-full rtl:-translate-x-full"
  >
    <div
      class="flex justify-between items-center py-3 px-4 border-b border-surface-200"
    >
      <h6
        class="font-bold uppercase mb-0 flex items-center text-lg"
        id="cartOffcanvasLabel"
      >
        <i
          class="bi bi-bag-plus text-corporate-600 me-2"
          aria-hidden="true"
        ></i>
        {% trans "Shopping Cart" %}
        <span
          class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-bold leading-none text-white bg-corporate-600 rounded-full ms-2 js-cart-badge"
          >{{ cart_count }}</span
        >
      </h6>
      <button
        type="button"
        class="text-charcoal-400 hover:text-charcoal-900 rounded-lg text-sm w-8 h-8 inline-flex items-center justify-center focus-visible:ring-2 focus-visible:ring-corporate-600 focus-visible:ring-offset-2"
        @click="open = false"
        aria-label="{% trans 'Close cart' %}"
      >
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>

    <div
      class="p-4 overflow-y-auto h-[calc(100vh-140px)] overscroll-y-contain js-cart-body"
    >
      {% include 'shared/partials/cart_items.html' %}
    </div>

    <div
      class="border-t border-surface-200 p-4 js-cart-footer bg-white absolute bottom-0 w-full"
    >
      {% include 'shared/partials/cart_footer.html' %}
    </div>
  </div>
</div>
