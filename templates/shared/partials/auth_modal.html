{% load i18n %}

{% if not user.is_authenticated %}
<div
  x-data="{ open: false }"
  x-show="open"
  x-on:open-auth.window="open = true"
  x-on:keydown.escape.window="open = false"
  x-on:click.window="if ($event.target === $el) open = false"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-200"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="fixed inset-0 z-[9999] overflow-y-auto bg-black/50 backdrop-blur-sm"
  role="dialog"
  aria-modal="true"
  aria-labelledby="authModalLabel"
  style="display: none;"
>
  <div class="min-h-screen flex items-center justify-center p-4">
    <div
      x-show="open"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-95"
      class="w-full sm:max-w-md bg-white rounded-xl shadow-2xl overflow-hidden"
      @click.stop
    >
      <div class="flex justify-center items-center py-6 px-4 relative border-b border-surface-100">
        <div class="text-center w-full mt-2">
          <h4 class="font-bold text-2xl mb-1 tracking-tight text-charcoal-900" id="authModalLabel">{% trans "Join Us" %}</h4>
          <p class="text-charcoal-500 text-sm">{% trans "Experience the best of Smart S3R." %}</p>
        </div>
        <button type="button" @click="open = false" class="absolute top-3 end-3 p-1 text-charcoal-400 hover:text-charcoal-600 hover:bg-surface-100 rounded-lg transition-colors">
          <span class="sr-only">Close</span>
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="p-4 pt-0 overflow-y-auto">
        <form action="{% url 'register' %}" method="post">
          {% csrf_token %}

          <div class="mb-4">
            <input type="text" name="username" id="modal_username"
                   class="block w-full px-3 py-2.5 bg-surface-50 border border-surface-200 rounded-lg text-sm text-charcoal-900 placeholder:text-charcoal-400 focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 outline-none transition-all"
                   placeholder="{% trans 'Username' %}" required>
          </div>

          <div class="mb-4">
            <input type="email" name="email" id="modal_email"
                   class="block w-full px-3 py-2.5 bg-surface-50 border border-surface-200 rounded-lg text-sm text-charcoal-900 placeholder:text-charcoal-400 focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 outline-none transition-all"
                   placeholder="{% trans 'Email' %}" required>
          </div>

          <div class="flex gap-4 mb-6">
            <div class="w-1/2">
              <input type="password" name="password1" id="modal_password1"
                     class="block w-full px-3 py-2.5 bg-surface-50 border border-surface-200 rounded-lg text-sm text-charcoal-900 placeholder:text-charcoal-400 focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 outline-none transition-all"
                     placeholder="{% trans 'Password' %}" required>
            </div>
            <div class="w-1/2">
              <input type="password" name="password2" id="modal_password2"
                     class="block w-full px-3 py-2.5 bg-surface-50 border border-surface-200 rounded-lg text-sm text-charcoal-900 placeholder:text-charcoal-400 focus:ring-2 focus:ring-corporate-600 focus:border-corporate-600 outline-none transition-all"
                     placeholder="{% trans 'Confirm' %}" required>
            </div>
          </div>

          <button type="submit" class="inline-flex items-center justify-center w-full px-4 py-2.5 text-sm font-semibold text-white bg-corporate-600 rounded-lg hover:bg-corporate-700 transition-colors shadow-sm mb-4">
            {% trans "Create Account" %}
          </button>
        </form>
      </div>

      <div class="bg-surface-50 py-4 flex justify-center border-t border-surface-100">
        <p class="text-charcoal-500 text-sm mb-0">
          {% trans "Already a member?" %}
          <a href="{% url 'login' %}" class="font-semibold text-corporate-600 hover:text-corporate-700 transition-colors">{% trans "Log in here" %}</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endif %}
