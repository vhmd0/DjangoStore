{# Global Toast Notification #}
<div
  x-data
  x-init="$watch('$store.toast.visible', v => { if (v) { $el.classList.remove('translate-y-full', 'opacity-0'); $el.classList.add('translate-y-0', 'opacity-100'); setTimeout(() => { if ($store.toast.visible) { $store.toast.hide(); $el.classList.add('translate-y-full', 'opacity-0'); $el.classList.remove('translate-y-0', 'opacity-100'); } }, 4000); } })"
  class="fixed bottom-4 end-4 z-[100] max-w-sm bg-white border border-surface-200 rounded-lg shadow-xl p-4 transform transition-all duration-300 translate-y-full opacity-0"
  x-show="$store.toast.visible"
  x-cloak
>
  <div class="flex items-start gap-3">
    <i
      class="bi flex-shrink-0 text-xl"
      :class="$store.toast.type === 'error' ? 'bi-exclamation-triangle-fill text-red-600' : $store.toast.type === 'success' ? 'bi-check-circle-fill text-green-600' : 'bi-info-circle-fill text-blue-600'"
    ></i>
    <p
      class="text-sm text-charcoal-700 flex-grow"
      x-text="$store.toast.message"
    ></p>
    <button
      @click="$store.toast.hide(); $el.parentElement.parentElement.classList.add('translate-y-full', 'opacity-0'); $el.parentElement.parentElement.classList.remove('translate-y-0', 'opacity-100');"
      class="flex-shrink-0 text-charcoal-400 hover:text-charcoal-600"
    >
      <i class="bi bi-x-lg text-xs"></i>
    </button>
  </div>
</div>
