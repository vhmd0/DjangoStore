<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ subject|default:"Smart S3r" }}</title>
    <style type="text/css">
        /* Reset styles */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        table { border-collapse: collapse !important; }
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }
        
        /* Client-specific resets */
        a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }
        
        /* Responsive */
        @media screen and (max-width: 620px) {
            .email-container { width: 100% !important; }
            .fluid { max-width: 100% !important; }
            .stack-column { display: block !important; width: 100% !important; }
            .center-on-mobile { text-align: center !important; }
            .button { width: auto !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <div style="display: none; max-height: 0; overflow: hidden;">
        {{ preview_text|default:"Smart S3r - Your Tech Store" }}
    </div>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f5f7;">
        <tr>
            <td align="center" style="padding: 40px 10px;">
                <table role="presentation" class="email-container" border="0" cellpadding="0" cellspacing="0" width="620" style="max-width: 620px;">
                    <tr>
                        <td style="padding: 0 0 30px 0; text-align: center;">
                            <a href="{{ site_url|default:"#" }}" style="text-decoration: none;">
                                <span style="font-size: 24px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px;">Smart</span>
                                <span style="font-size: 24px; font-weight: 700; color: #4361ee;">S3r</span>
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: #ffffff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
                            <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                                {% block content %}{% endblock %}
                            </table>
                            
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 30px 0; text-align: center; color: #6b7280; font-size: 14px; line-height: 1.6;">
                            <p style="margin: 0 0 8px 0; font-weight: 600; color: #1a1a2e;">Smart S3r</p>
                            <p style="margin: 0 0 16px 0; color: #9ca3af;">Your Tech Store</p>
                            {% block footer %}{% endblock %}
                        </td>
                    </tr>
                    {% block unsubscribe %}
                    <tr>
                        <td style="text-align: center; padding: 0 0 20px 0;">
                            <a href="{{ unsubscribe_url|default:"#" }}" style="color: #9ca3af; font-size: 12px; text-decoration: underline;">Unsubscribe</a>
                        </td>
                    </tr>
                    {% endblock %}
                    
                </table>
                
            </td>
        </tr>
    </table>

</body>
</html>
